<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roulette Wheel</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #121212;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  margin: 10px 0;
  font-size: 20px;
}

.controls {
  width: 95%;
  display: flex;
  gap: 5px;
  margin-bottom: 5px;
}

input {
  flex: 1;
  padding: 12px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background: #4da6ff;
  color: white;
}

canvas {
  width: 90vw;
  height: 90vw;
  max-width: 400px;
  max-height: 400px;
  background: white;
  border-radius: 50%;
  margin-top: 5px;
}

/* Pointer stays at top */
.pointer {
  width: 0;
  height: 0;
  border-left: 12px solid transparent;
  border-right: 12px solid transparent;
  border-bottom: 20px solid yellow;
}

.options {
  margin-top: 10px;
  font-size: 14px;
  text-align: center;
  padding: 0 10px;
}

.result {
  margin-top: 5px;
  font-size: 18px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>Roulette Wheel</h1>

<div class="controls">
  <input type="text" id="optionInput" placeholder="Add option">
  <button onclick="addOption()">+</button>
</div>

<div class="controls">
  <button style="flex:1;background:#28a745;" onclick="spinWheel()">SPIN</button>
</div>

<div class="pointer"></div>
<canvas id="wheel"></canvas>

<div class="options" id="optionsList"></div>
<div class="result" id="resultText"></div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let options = [];
let angle = Math.PI; // ROTATE WHEEL 180° by default

/* Resize for mobile */
function resizeCanvas() {
  const size = Math.min(window.innerWidth * 0.9, 400);
  canvas.width = size;
  canvas.height = size;
  drawWheel();
}
window.addEventListener("resize", resizeCanvas);

/* Add option */
function addOption() {
  const input = document.getElementById("optionInput");
  const val = input.value.trim();
  if (!val) return;

  options.push(val);
  input.value = "";
  updateOptionsList();
  drawWheel();
}

/* Show options */
function updateOptionsList() {
  document.getElementById("optionsList").innerText =
    options.length ? "Options: " + options.join(", ") : "";
}

/* 
Distribute each option x3 WITHOUT placing duplicates next to each other
Example:
A,B,C -> A,B,C,A,B,C,A,B,C
*/
function expandedOptions() {
  let arranged = [];

  if (!options.length) return arranged;

  for (let round = 0; round < 3; round++) {
    for (let i = 0; i < options.length; i++) {
      arranged.push({
        label: options[i],
        baseIndex: i
      });
    }
  }

  return arranged;
}

/* Same color for each original option */
function getColor(index) {
  const hue = (index * 360 / options.length);
  return `hsl(${hue}, 70%, 60%)`;
}

/* Draw wheel */
function drawWheel() {
  const items = expandedOptions();
  const size = canvas.width;
  const center = size / 2;
  const radius = center;

  ctx.clearRect(0, 0, size, size);
  if (!items.length) return;

  const arc = (2 * Math.PI) / items.length;

  items.forEach((item, i) => {
    const start = angle + i * arc;
    const end = start + arc;

    ctx.beginPath();
    ctx.moveTo(center, center);
    ctx.arc(center, center, radius, start, end);
    ctx.fillStyle = getColor(item.baseIndex);
    ctx.fill();

    ctx.save();
    ctx.translate(center, center);
    ctx.rotate(start + arc / 2);
    ctx.fillStyle = "#000";
    ctx.font = (radius / 12) + "px Arial";
    ctx.textAlign = "center";
    ctx.fillText(item.label, radius * 0.62, 5);
    ctx.restore();
  });
}

/* Better spin */
function easeOutCubic(t) {
  return 1 - Math.pow(1 - t, 3);
}

function spinWheel() {
  if (!options.length) return;

  const duration = 4000;
  const startAngle = angle;
  const spins = Math.random() * 6 + 8;
  const targetAngle = startAngle + spins * 2 * Math.PI;

  let start = null;

  function animate(timestamp) {
    if (!start) start = timestamp;

    const progress = Math.min((timestamp - start) / duration, 1);
    const eased = easeOutCubic(progress);

    angle = startAngle + (targetAngle - startAngle) * eased;

    drawWheel();

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      showResult();
    }
  }

  requestAnimationFrame(animate);
}

/* Result from top pointer */
function showResult() {
  const items = expandedOptions();
  if (!items.length) return;

  const arc = (2 * Math.PI) / items.length;

  const pointerAngle = (3 * Math.PI) / 2;
  const adjusted = (angle + pointerAngle) % (2 * Math.PI);

  const index = Math.floor((2 * Math.PI - adjusted) / arc) % items.length;

  document.getElementById("resultText").innerText =
    "Result: " + items[index].label;
}

/* Init */
resizeCanvas();
</script>

</body>
</html>

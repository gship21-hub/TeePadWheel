<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roulette Wheel</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #121212;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  margin: 10px 0;
  font-size: 20px;
}

.controls {
  width: 95%;
  display: flex;
  gap: 5px;
  margin-bottom: 5px;
}

input {
  flex: 1;
  padding: 12px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background: #4da6ff;
  color: white;
}

canvas {
  width: 90vw;
  height: 90vw;
  max-width: 400px;
  max-height: 400px;
  background: white;
  border-radius: 50%;
  margin-top: 0;
}

/* POINTER ABOVE WHEEL, POINT FACING DOWN */
.pointer {
  width: 0;
  height: 0;
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-top: 24px solid yellow;
  margin-bottom: -3px;
  z-index: 10;
}

.options {
  margin-top: 10px;
  font-size: 14px;
  text-align: center;
  padding: 0 10px;
}

.result {
  margin-top: 5px;
  font-size: 18px;
  font-weight: bold;
  padding-bottom: 20px;
}
</style>
</head>

<body>

<h1>Roulette Wheel</h1>

<div class="controls">
  <input type="text" id="optionInput" placeholder="Add option">
  <button onclick="addOption()">+</button>
</div>

<div class="controls">
  <button style="flex:1;background:#28a745;" onclick="spinWheel()">SPIN</button>
</div>

<div class="pointer"></div>
<canvas id="wheel"></canvas>

<div class="options" id="optionsList"></div>
<div class="result" id="resultText"></div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let options = [];
let angle = 0;

/* Resize for mobile */
function resizeCanvas() {
  const size = Math.min(window.innerWidth * 0.9, 400);
  canvas.width = size;
  canvas.height = size;
  drawWheel();
}
window.addEventListener("resize", resizeCanvas);

/* Add option */
function addOption() {
  const input = document.getElementById("optionInput");
  const val = input.value.trim();

  if (!val) return;

  options.push(val);
  input.value = "";

  updateOptionsList();
  drawWheel();
}

/* Show entered options */
function updateOptionsList() {
  document.getElementById("optionsList").innerText =
    options.length ? "Options: " + options.join(", ") : "";
}

/*
Multiply each option x3
Distribute so duplicates are NOT adjacent:
A,B,C => A,B,C,A,B,C,A,B,C
*/
function expandedOptions() {
  let arranged = [];

  if (!options.length) return arranged;

  for (let round = 0; round < 3; round++) {
    for (let i = 0; i < options.length; i++) {
      arranged.push({
        label: options[i],
        baseIndex: i
      });
    }
  }

  return arranged;
}

/* One consistent color per original option */
function getColor(index) {
  const hue = (index * 360 / Math.max(options.length, 1));
  return `hsl(${hue}, 70%, 60%)`;
}

/* Draw wheel */
function drawWheel() {
  const items = expandedOptions();

  const size = canvas.width;
  const center = size / 2;
  const radius = center;

  ctx.clearRect(0, 0, size, size);

  if (!items.length) return;

  const arc = (2 * Math.PI) / items.length;

  items.forEach((item, i) => {
    const start = angle + i * arc;
    const end = start + arc;

    /* Slice */
    ctx.beginPath();
    ctx.moveTo(center, center);
    ctx.arc(center, center, radius, start, end);
    ctx.closePath();

    ctx.fillStyle = getColor(item.baseIndex);
    ctx.fill();

    /* Text */
    ctx.save();
    ctx.translate(center, center);
    ctx.rotate(start + arc / 2);

    ctx.fillStyle = "#000";
    ctx.font = `${Math.max(radius / 13, 12)}px Arial`;
    ctx.textAlign = "center";

    ctx.fillText(item.label, radius * 0.63, 5);

    ctx.restore();
  });

  /* Center circle */
  ctx.beginPath();
  ctx.arc(center, center, radius * 0.08, 0, 2 * Math.PI);
  ctx.fillStyle = "#222";
  ctx.fill();
}

/* Smooth spin easing */
function easeOutCubic(t) {
  return 1 - Math.pow(1 - t, 3);
}

/* Spin */
function spinWheel() {
  if (!options.length) return;

  document.getElementById("resultText").innerText = "";

  const duration = 4500;
  const startAngle = angle;

  const spins = Math.random() * 6 + 8;
  const targetAngle = startAngle + spins * 2 * Math.PI;

  let start = null;

  function animate(timestamp) {
    if (!start) start = timestamp;

    const progress = Math.min((timestamp - start) / duration, 1);
    const eased = easeOutCubic(progress);

    angle = startAngle + (targetAngle - startAngle) * eased;

    drawWheel();

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      showResult();
    }
  }

  requestAnimationFrame(animate);
}

/* Result from TOP pointer */
function showResult() {
  const items = expandedOptions();

  if (!items.length) return;

  const arc = (2 * Math.PI) / items.length;

  /*
  Pointer is fixed at TOP (270°)
  Determine which segment is under that point
  */
  const pointerAngle = (3 * Math.PI) / 2;

  const normalized =
    ((2 * Math.PI) - (angle % (2 * Math.PI)) + pointerAngle) % (2 * Math.PI);

  const index = Math.floor(normalized / arc) % items.length;

  document.getElementById("resultText").innerText =
    "Result: " + items[index].label;
}

/* Init */
resizeCanvas();
</script>

</body>
</html>
